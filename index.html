<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GDV Bioinformatics Lab</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1020;
    color:#e6edf3;
}

/* HEADER */
header {
    text-align:center;
    padding:30px;
    background:#020617;
}

/* CENTER ENTIRE VIEWER SECTION */
#visual {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:80vh;
}

/* TRUE CENTERED VIEWER */
.viewer-box {
    width:90%;
    max-width:900px;
    height:520px;
    border-radius:14px;
    overflow:hidden;
    background:#ffffff;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* CONTROLS */
.control-panel {
    margin-top:20px;
    width:90%;
    max-width:400px;
    background:#111827;
    padding:20px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.control-panel input,
.control-panel select,
.control-panel button {
    padding:10px;
    border-radius:6px;
    border:none;
    width:100%;
}

.control-panel button {
    background:#38bdf8;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>GDV Bioinformatics Lab</h1>
<p>Computational Drug Discovery | Structural Biology | Genomics</p>
</header>

<section id="visual">

<h2>Protein Structure Viewer</h2>

<div id="viewer" class="viewer-box"></div>

<div class="control-panel">
<input type="text" id="inputBox" placeholder="PDB (3QTS) or UniProt (P69905)">
<button onclick="loadStructure()">Load Structure</button>

<select onchange="changeStyle(this.value)">
<option value="cartoon">Cartoon</option>
<option value="stick">Stick</option>
<option value="surface">Surface</option>
</select>

<input type="text" id="residueInput" placeholder="Residue number (e.g. 45)">
<button onclick="highlightResidue()">Highlight Residue</button>

<button onclick="resetView()">Reset</button>
</div>

</section>

<script>
let viewer;

// 🔥 FIX: initialize AFTER layout is ready
window.addEventListener("load", () => {

    viewer = $3Dmol.createViewer("viewer", {
        backgroundColor: "white"
    });

    loadStructure();

    // 🔥 Important: force resize fix
    setTimeout(() => {
        viewer.resize();
        viewer.render();
    }, 300);
});

// LOAD STRUCTURE
function loadStructure() {
    let input = document.getElementById("inputBox").value.trim();
    if (!input) input = "3QTS";

    viewer.clear();

    if (input.length === 4) {
        $3Dmol.download("pdb:" + input, viewer, {}, function() {
            viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
            viewer.setStyle({hetflag:true}, {stick:{}});
            viewer.zoomTo();
            viewer.render();
        });
    } else {
        let url = `https://alphafold.ebi.ac.uk/files/AF-${input}-F1-model_v4.pdb`;
        viewer.addModelFromUrl(url, "pdb", function() {
            viewer.setStyle({}, {cartoon: {color: 'confidence'}});
            viewer.zoomTo();
            viewer.render();
        });
    }
}

// STYLE SWITCH
function changeStyle(style) {
    viewer.setStyle({}, {});
    viewer.removeAllSurfaces();

    if (style === "cartoon") {
        viewer.setStyle({}, {cartoon:{color:'spectrum'}});
    } else if (style === "stick") {
        viewer.setStyle({}, {stick:{}});
    } else {
        viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity:0.7});
    }

    viewer.render();
}

// HIGHLIGHT RESIDUE
function highlightResidue() {
    let res = parseInt(document.getElementById("residueInput").value);

    if (isNaN(res)) return alert("Enter valid residue");

    viewer.setStyle({}, {cartoon:{color:'spectrum'}});
    viewer.setStyle({resi:res}, {stick:{color:"red"}});
    viewer.zoomTo({resi:res});
    viewer.render();
}

// RESET
function resetView() {
    document.getElementById("inputBox").value = "";
    document.getElementById("residueInput").value = "";
    loadStructure();
}
</script>

</body>
</html>

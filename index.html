<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>GDV Bioinformatics Lab</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter',sans-serif; background:#0b1020; color:#e6edf3; }
header { background:#020617; padding:30px; text-align:center; }
nav { display:flex; justify-content:center; gap:20px; padding:10px; background:#020617; }
nav a { color:#38bdf8; text-decoration:none; }
section { max-width:1100px; margin:auto; padding:40px 20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
.card { background:#111827; padding:20px; border-radius:12px; }
footer { text-align:center; padding:20px; background:#020617; }
.btn { background:#38bdf8; color:#000; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-left:5px; }
input { padding:8px; border-radius:6px; border:none; width:250px; }
</style>
</head>

<body>

<header>
<h1>GDV Bioinformatics Lab</h1>
<p>Computational Drug Discovery | Structural Biology | Genomics</p>
</header>

<nav>
<a href="#visual">Structure Viewer</a>
</nav>

<section id="visual">
<h2>Protein Structure Viewer</h2>

<div id="viewer" style="width:100%; height:500px; border-radius:12px;"></div>

<br><br>

<input type="text" id="inputBox" placeholder="Enter PDB ID (3QTS) or UniProt ID (P69905)" />
<button class="btn" onclick="loadStructure()">Load</button>

<p style="font-size:13px; opacity:0.7;">
Tip: Use PDB ID or UniProt ID (for AlphaFold prediction)
</p>

</section>

<footer>
<p>© 2026 GDV Bioinformatics Lab</p>
</footer>

<script>
let viewer = $3Dmol.createViewer("viewer", {
    backgroundColor: "white"
});

// Detect input type
function isPDB(id) {
    return id.length === 4;
}

function isUniProt(id) {
    return id.length >= 6;
}

function loadStructure() {
    let input = document.getElementById("inputBox").value.trim();

    if (!input) input = "3QTS";

    viewer.clear();

    // 🔹 Case 1: PDB ID
    if (isPDB(input)) {

        $3Dmol.download("pdb:" + input, viewer, {}, function() {

            viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
            viewer.setStyle({hetflag:true}, {stick: {colorscheme: "greenCarbon"}});
            viewer.zoomTo();
            viewer.render();
        });

    }

    // 🔹 Case 2: UniProt → AlphaFold
    else if (isUniProt(input)) {

        let url = `https://alphafold.ebi.ac.uk/files/AF-${input}-F1-model_v4.pdb`;

        viewer.addModelFromUrl(url, "pdb", function() {

            viewer.setStyle({}, {cartoon: {color: 'confidence'}});
            viewer.zoomTo();
            viewer.render();
        });

    }

    else {
        alert("Invalid input. Use PDB ID or UniProt ID.");
    }
}

// Load default
loadStructure();
</script>

</body>
</html>
